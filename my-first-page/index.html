<!DOCTYPE html>
<html>
<head>
  <title>Noa's Page</title>
  <style>
    /* CSS controls how things LOOK */
    /* Try changing the colors and sizes! */

    body {
      background: #0a162e;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
    }

    h1 {
      color: #4e475f;
      font-size: 48px;
    }

    .art-box {
      width: 300px;
      height: 300px;
      margin: 20px auto;
      background: linear-gradient(135deg, #ff0000, #00ff00, #ffff00);
      border-radius: 50%;
      animation: spinpulse 4s ease-in-out infinite;
    }

    /* This makes the box spin! */
    @keyframes spinpulse {
      0% { transform: rotate(0deg) scale(1); }
      25% { transform: rotate(90deg) scale(1.3); }
      50% { transform: rotate(180deg) scale(1.3); }
      75% { transform: rotate(270deg) scale(1.3); }
      100% { transform: rotate(360deg) scale(1); }
    }

    /* TRY THIS: Change 'spin' to something else */
    /* TRY THIS: Change the colors in the gradient */
    /* TRY THIS: Change border-radius to 50% (makes it a circle!) */
    /* TRY THIS: Add more colors to the gradient */
  </style>
</head>
<body>
  <h1>Noa's Art Studio</h1>
  <p>This circle is animated with pure CSS!</p>
  <div class="art-box"></div>
  <p>Edit the code to make it yours.</p>
</body>
</html>
